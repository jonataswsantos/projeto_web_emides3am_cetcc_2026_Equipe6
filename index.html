<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>Simulador de Impostos - Dashboard</title>
</head>

<body>
    <section class="categorias">
        <div class="card" id="cadastro">
            <div class="card-info">
                <h3>Cadastrar Produto</h3>
                <p>Faça a simulação de um novo item</p>
            </div>
        </div>
        <div class="card" id="exibicao">
            <div class="card-info">
                <h3>Lista de Produtos</h3>
                <p>Veja todos os itens e seus impostos</p>
            </div>
        </div>
    </section>

    <section class="inserir-dados-container">
        
        <div class="inserir-info-container ativo">
            <div class="inserir-dados">
                <h2>Preencha os Dados do Produto</h2>
                <form id="form-produto">
                    <div class="form-flex">
                        <label for="produto">Nome do Produto</label>
                        <input type="text" id="produto" name="produto" required>
                        
                        <label for="descricao">Descrição do Produto</label>
                        <textarea id="descricao" name="descricao" rows="3" required></textarea>
                        
                        <label for="valor">Valor Unitário (R$)</label>
                        <input type="number" id="valor" name="valor" min="0" step="0.01" required>
                        
                        <label for="quantidade">Quantidade</label>
                        <input type="number" id="quantidade" name="quantidade" min="1" required>
                        
                        <label for="tipo">Tipo do Produto (Imposto)</label>
                        <select id="tipo" name="tipo" required>
                            <option value="" disabled selected>Selecione uma opção...</option>
                            <option value="1">Tipo 1 - Isento</option>
                            <option value="2">Tipo 2 - 8%</option>
                            <option value="3">Tipo 3 - 10%</option>
                            <option value="4">Tipo 4 - 12%</option>
                            <option value="5">Tipo 5 - 17%</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-form">Adicionar Produto</button>
                </form>
            </div>
        </div>
        
        <div class="exibir-produtos">
            </div>

    </section>

    <script>
        const cards = document.querySelectorAll('.card');
        const cadastro = document.querySelector('.inserir-info-container');
        const exibicao = document.querySelector('.exibir-produtos');

        cards.forEach(item => {
            item.addEventListener('click', () => {
                const itemId = item.id;
                if (itemId === 'cadastro') {
                    cadastro.classList.add('ativo');
                    exibicao.classList.remove('ativo');
                }
                else if (itemId === 'exibicao') {
                    exibicao.classList.add('ativo');
                    cadastro.classList.remove('ativo');
                }
            });
        });
    </script>
    <script src="./js/script.js"></script>
</body>
</html>
